{{define "browse_blob.html"}}{{template "top" .}}
{{template "browse_head" .}}
<p>{{.Size}} bytes · <a href="/{{.Repo}}/raw/{{.Ref}}/{{.Path}}">raw</a></p>
{{if .Binary}}
<p>Binary file — <a href="/{{.Repo}}/raw/{{.Ref}}/{{.Path}}">download</a>.</p>
{{else if .Rendered}}
<div class="markdown-body">{{.Rendered}}</div>
{{else if .Highlighted}}
{{.Highlighted}}
{{else}}
<pre>{{.Text}}</pre>
{{end}}
{{template "bottom" .}}{{end}}
